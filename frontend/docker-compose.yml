version: "3.9"

services:
  promptforge-app:
    build: .
    container_name: promptforge-app
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - promptforge-network

networks:
  promptforge-network:
    external: true
